<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Take the 45-question Career Compass assessment — personalised career matches based on your personality, budget, and stream preference.">
  <meta name="keywords" content="career guidance India, RIASEC test, Class 10 career, aptitude test students, career after 10th">
  <meta name="author" content="Career Compass">
  <link rel="canonical" href="https://akshaynikhare.github.io/career-compass/test.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Career Compass">
  <meta property="og:title" content="Career Compass — Take the Assessment">
  <meta property="og:description" content="Take the 45-question Career Compass assessment — personalised career matches based on your personality, budget, and stream preference.">
  <meta property="og:url" content="https://akshaynikhare.github.io/career-compass/test.html">
  <meta property="og:image" content="https://akshaynikhare.github.io/career-compass/icons/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Career Compass — Take the Assessment">
  <meta name="twitter:description" content="Take the 45-question Career Compass assessment — personalised career matches based on your personality, budget, and stream preference.">
  <meta name="twitter:image" content="https://akshaynikhare.github.io/career-compass/icons/og-image.svg">
  <title>Career Compass — Take the Assessment</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .form-group { margin-bottom: 1rem; }
    .form-group label { display:block; font-size:0.875rem; font-weight:600; color:var(--text); margin-bottom:0.4rem; }
    .form-group input { width:100%; padding:0.65rem 0.875rem; border:2px solid var(--border); border-radius:8px; font-size:1rem; color:var(--text); box-sizing:border-box; }
    .form-group input:focus { outline:none; border-color:var(--primary); }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="test-header">
      <a href="index.html" class="app-logo btn-ghost" style="padding-left:0; color: var(--primary); font-weight:700; font-size:1rem; text-decoration:none;">
        &#9711; Career Advisor
      </a>
    </div>

    <!-- Student Info (Phase 0) -->
    <div id="student-info-phase" class="card">
      <p class="question-type-label">Before we begin</p>
      <h2 style="font-size:1.25rem; margin-bottom:0.25rem;">Tell us about yourself</h2>
      <p class="text-muted" style="font-size:0.875rem; margin-bottom:1.5rem;">Your details help personalise your career report. We keep them private.</p>
      <div class="form-group">
        <label for="si-name">Full Name *</label>
        <input type="text" id="si-name" placeholder="Your full name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="si-email">Email Address *</label>
        <input type="email" id="si-email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="si-phone">Mobile Number *</label>
        <input type="tel" id="si-phone" placeholder="10-digit mobile number" autocomplete="tel" maxlength="10" pattern="[0-9]{10}" />
      </div>
      <p id="si-error" class="hidden" style="color:#DC2626; font-size:0.875rem; margin-top:0.5rem;"></p>
      <button class="btn-primary" id="btn-begin" style="margin-top:1rem;">Begin Test &#8594;</button>
    </div>

    <!-- Progress bar (hidden during phase 0) -->
    <div class="progress-wrapper hidden" id="progress-wrapper">
      <div class="progress-label">
        <span id="progress-text">Personal Background — Q1 of 10</span>
        <span id="progress-pct">2%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 2%"></div>
      </div>
    </div>

    <!-- Question card (hidden during phase 0) -->
    <div class="card hidden" id="question-card">
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p class="mt-2 text-muted">Loading questions…</p>
      </div>

      <div id="question-content" class="hidden">
        <span class="question-type-label" id="question-type-label"></span>
        <p class="question-number" id="question-number"></p>
        <p class="question-text" id="question-text"></p>
        <div class="options-list" id="options-list"></div>
      </div>
    </div>

    <!-- Navigation (hidden during phase 0) -->
    <div class="nav-buttons hidden" id="nav-buttons">
      <button class="btn-ghost" id="btn-prev" disabled>&#8592; Prev</button>
      <button class="btn-primary" id="btn-next" disabled>Next &rarr;</button>
    </div>

    <!-- Error message -->
    <p id="error-msg" class="hidden text-center mt-2" style="color:#DC2626; font-size:0.875rem;"></p>
  </div>

  <script src="src/config.js"></script>
  <script src="src/match.js"></script>
  <script src="src/store.js"></script>
  <script src="src/app.js"></script>
  <script src="src/i18n.js"></script>
</body>
</html>
