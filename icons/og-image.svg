<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="#ffffff" opacity="0.05"/>
  <circle cx="150" cy="550" r="220" fill="#ffffff" opacity="0.04"/>
  <circle cx="980" cy="500" r="120" fill="#ffffff" opacity="0.06"/>

  <!-- Card backdrop -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Compass icon -->
  <circle cx="120" cy="120" r="32" fill="#ffffff" opacity="0.15"/>
  <text x="120" y="128" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle">⊙</text>

  <!-- App name -->
  <text x="165" y="132" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" letter-spacing="-0.5">Career Compass</text>

  <!-- Divider -->
  <rect x="100" y="165" width="80" height="4" rx="2" fill="#ffffff" opacity="0.4"/>

  <!-- Tagline -->
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">Find your career path</text>
  <text x="100" y="330" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">after Class 10</text>

  <!-- Subtext -->
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" opacity="0.85">Free RIASEC personality test · 507 Indian professions · AI-powered matching</text>

  <!-- Stats chips -->
  <rect x="100" y="450" width="200" height="52" rx="26" fill="#ffffff" opacity="0.15"/>
  <text x="200" y="482" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">507 Careers</text>

  <rect x="318" y="450" width="150" height="52" rx="26" fill="#ffffff" opacity="0.15"/>
  <text x="393" y="482" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Free</text>

  <rect x="486" y="450" width="180" height="52" rx="26" fill="#ffffff" opacity="0.15"/>
  <text x="576" y="482" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">No Signup</text>

  <rect x="684" y="450" width="220" height="52" rx="26" fill="#ffffff" opacity="0.15"/>
  <text x="794" y="482" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">10 Minutes</text>

  <!-- URL -->
  <text x="1140" y="590" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.5" text-anchor="end">akshaynikhare.github.io/career-compass</text>
</svg>
