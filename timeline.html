<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Advisor — Timeline</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="container">

    <div class="test-header">
      <a href="index.html" class="btn-ghost" style="padding-left:0; color:var(--primary); font-weight:700; font-size:1rem; text-decoration:none;">
        &#9711; Career Advisor
      </a>
      <a href="result.html" class="btn-secondary" style="font-size:0.8125rem; padding:0.4rem 0.875rem;">
        &larr; Back to Results
      </a>
    </div>

    <div id="no-result" class="hidden card text-center" style="padding:2rem;">
      <p style="font-size:2rem;">&#128214;</p>
      <h2 class="mt-1">No results yet</h2>
      <p class="mt-1">Complete the test first to see your career timeline.</p>
      <a href="test.html" class="btn-primary mt-2" style="margin-top:1rem;">Take the Test &rarr;</a>
    </div>

    <div id="timeline-content" class="hidden">

      <div class="card" style="margin-bottom:1rem;">
        <h1 style="font-size:1.375rem; font-weight:700; margin-bottom:0.75rem;">Career Timeline</h1>
        <label for="career-select" style="display:block; font-size:0.875rem; color:var(--muted); margin-bottom:0.375rem;">Select a career to explore</label>
        <select id="career-select" style="width:100%; padding:0.5rem 0.75rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:0.9375rem; color:var(--text); background:var(--white); cursor:pointer;"></select>
      </div>

      <div id="timeline-wrap"></div>

    </div>

  </div>

  <script src="src/path_parse.js"></script>
  <script src="src/timeline.js"></script>
</body>
</html>
